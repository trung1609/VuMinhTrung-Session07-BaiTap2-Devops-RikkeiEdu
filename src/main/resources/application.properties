# =========================================================
# application.properties - Cấu hình cho môi trường LOCAL
# =========================================================

spring.application.name=user-service

# ---------------------------------------------------------
# H2 IN-MEMORY DATABASE (dùng cho demo và local dev)
# ---------------------------------------------------------
spring.datasource.url=jdbc:h2:mem:userdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate settings
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
# BẮT BUỘC với Spring Boot 3.x: đảm bảo data.sql chạy SAU khi Hibernate tạo bảng
spring.jpa.defer-datasource-initialization=true
spring.jpa.properties.hibernate.format_sql=true

# Bật H2 Console để xem database qua trình duyệt: http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---------------------------------------------------------
# SERVER
# ---------------------------------------------------------
server.port=8080
server.error.include-message=always

# ---------------------------------------------------------
# APP METADATA (dùng trong InfoController)
# ---------------------------------------------------------
app.version=1.0.0
app.description=User Management Microservice - Demo for CI/CD DevOps Course BE-105

# ---------------------------------------------------------
# SPRING ACTUATOR (Health, Metrics, Info)
# ---------------------------------------------------------
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ---------------------------------------------------------
# LOGGING
# ---------------------------------------------------------
logging.level.com.devops.demo=DEBUG
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
