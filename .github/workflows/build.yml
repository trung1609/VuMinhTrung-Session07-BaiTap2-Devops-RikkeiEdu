name: CI/CD Pipeline - user-service

on:
  push:
    branches: ["main", "dev"]
    tags: ["v*.*.*"]
  pull_request:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  MAVEN_CLI_OPTS: "-B -e -V"
  # Create CI_COMMIT_REF_SLUG from branch/ref name (lowercased, slashes replaced)
  CI_COMMIT_REF_SLUG: ${{ toLower(replace(github.ref_name, '/', '-')) }}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Restore cache (maven repo + target)
        id: cache-maven
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            target
          key: ${{ env.CI_COMMIT_REF_SLUG }}

      - name: Build (skip tests)
        run: mvn $MAVEN_CLI_OPTS -DskipTests=true package

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Restore cache (maven repo + target)
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            target
          key: ${{ env.CI_COMMIT_REF_SLUG }}

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar

      - name: Run Unit Tests
        run: mvn $MAVEN_CLI_OPTS test
